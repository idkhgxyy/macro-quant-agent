[mypy]
python_version = 3.9
explicit_package_bases = True
ignore_missing_imports = True
no_implicit_optional = True
check_untyped_defs = False
disallow_untyped_defs = False
warn_unused_ignores = False
warn_redundant_casts = False

# Per-module overrides
[mypy-core.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-llm.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-data.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-execution.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-utils.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-backtest.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-dashboard.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-reports.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-run_agent]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-run_scheduler]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-run_llm_backtest]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-config]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-policy]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-strategy_registry]
disallow_untyped_defs = False
check_untyped_defs = False

# Third-party libs without stubs
[mypy-ib_insync.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True
