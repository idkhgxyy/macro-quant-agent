<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Isolation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-header">
        <div class="sb-brand">
          <div class="sb-mark">I</div>
          <span class="sb-name">Isolation</span>
        </div>
        <button class="sb-close" id="btn-sidebar-close" title="Close">&times;</button>
      </div>

      <div class="sb-section">
        <div class="sb-section-title">API Keys</div>
        <div class="sb-field">
          <label for="set-deepseek-key">DeepSeek API Key</label>
          <input type="password" id="set-deepseek-key" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="sb-field">
          <label for="set-deepseek-model">DeepSeek Model</label>
          <input type="text" id="set-deepseek-model" placeholder="deepseek-chat" />
        </div>
        <div class="sb-field">
          <label for="set-fmp-key">FMP API Key</label>
          <input type="password" id="set-fmp-key" placeholder="Financial Modeling Prep Key (recommended)" autocomplete="off" />
        </div>
        <div class="sb-field">
          <label for="set-alphavantage-key">Alpha Vantage Key</label>
          <input type="password" id="set-alphavantage-key" placeholder="Alpha Vantage API Key (backup)" autocomplete="off" />
        </div>
        <div class="sb-field">
          <label for="set-anysearch-key">AnySearch Key</label>
          <input type="password" id="set-anysearch-key" placeholder="AnySearch API Key (optional)" autocomplete="off" />
        </div>
      </div>

      <div class="sb-section">
        <div class="sb-section-title">Broker</div>
        <div class="sb-field">
          <label for="set-broker-type">Broker Type</label>
          <select id="set-broker-type">
            <option value="mock">Mock (模拟)</option>
            <option value="ibkr">IBKR (盈透)</option>
          </select>
        </div>
        <div class="sb-field sb-toggle-field">
          <label for="set-live-trading">Live Trading</label>
          <div class="toggle-wrap">
            <input type="checkbox" id="set-live-trading" />
            <span class="toggle-label" id="lbl-live-trading">OFF</span>
          </div>
        </div>
      </div>

      <div class="sb-section">
        <div class="sb-section-title">Stock Universe</div>
        <div class="sb-field">
          <label for="set-tech-universe">Tickers (comma-separated)</label>
          <input type="text" id="set-tech-universe" placeholder="AAPL,MSFT,NVDA,GOOGL,META,AMZN,TSLA,PLTR,MU" />
        </div>
        <div class="sb-field">
          <label>Preset Templates</label>
          <div class="preset-btns">
            <button class="preset-btn" data-preset="tech_growth">Tech Growth</button>
            <button class="preset-btn" data-preset="large_cap_value">Large Cap Value</button>
            <button class="preset-btn" data-preset="dividend_income">Dividend Income</button>
            <button class="preset-btn" data-preset="mixed_balanced">Mixed Balanced</button>
          </div>
        </div>
      </div>

      <div class="sb-section">
        <div class="sb-section-title">Market Hours</div>
        <div class="sb-field sb-toggle-field">
          <label for="set-enforce-rth">Enforce RTH</label>
          <div class="toggle-wrap">
            <input type="checkbox" id="set-enforce-rth" />
            <span class="toggle-label" id="lbl-enforce-rth">OFF</span>
          </div>
        </div>
        <div class="sb-field sb-toggle-field">
          <label for="set-allow-outside-rth">Allow Outside RTH</label>
          <div class="toggle-wrap">
            <input type="checkbox" id="set-allow-outside-rth" />
            <span class="toggle-label" id="lbl-allow-outside-rth">OFF</span>
          </div>
        </div>
      </div>

      <div class="sb-actions">
        <button class="sb-btn primary" id="btn-save-settings">Save</button>
        <div class="sb-save-msg" id="save-msg"></div>
      </div>

      <div class="sb-footer">
        <div class="sb-foot-row">
          <span class="sb-foot-label">Date</span>
          <select class="sb-select" id="select-date">
            <option value="">Latest</option>
          </select>
        </div>
        <div class="sb-foot-btns">
          <button class="sb-btn small" id="btn-date-latest">Latest</button>
          <button class="sb-btn small" id="btn-refresh">Refresh</button>
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main -->
    <div class="main" id="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-btn" id="btn-sidebar-open">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <h1 class="brand">
            <span class="brand-serif">Isolation</span>
          </h1>
        </div>
        <div class="topbar-right">
          <div class="pill" id="pill-status">—</div>
          <div class="pill ghost" id="pill-date">—</div>
          <a class="monitor-link" href="/monitor" id="link-monitor">Monitor</a>
          <button class="lang-btn" id="btn-lang-toggle">EN</button>
        </div>
      </header>

      <div class="content">
        <!-- Hero: Equity + KPIs -->
        <section class="card hero">
          <div class="hero-top">
            <div class="hero-left">
              <div class="hero-label">Total Equity</div>
              <div class="hero-value" id="kpi-equity">—</div>
              <div class="hero-sub" id="hero-date-sub"></div>
            </div>
            <div class="hero-kpis">
              <div class="kpi"><div class="kpi-label">Cash</div><div class="kpi-value" id="kpi-cash">—</div></div>
              <div class="kpi"><div class="kpi-label">Positions</div><div class="kpi-value" id="kpi-pos">—</div></div>
              <div class="kpi"><div class="kpi-label">Turnover</div><div class="kpi-value" id="kpi-turnover">—</div></div>
            </div>
          </div>
          <div class="chart-area" id="chart-equity"></div>
        </section>

        <!-- Row: Positions + Strategy -->
        <div class="row-2col">
          <section class="card">
            <div class="card-head">
              <h2 class="card-title">Positions</h2>
            </div>
            <div class="card-body">
              <div class="table-wrap" id="table-positions"></div>
            </div>
          </section>

          <section class="card">
            <div class="card-head">
              <h2 class="card-title">Strategy</h2>
            </div>
            <div class="card-body">
              <div class="strategy-chips" id="chips-strategies"></div>
              <div class="reasoning-box" id="text-reasoning">—</div>
              <div class="alloc-row">
                <div class="ae-label">Target Weights</div>
                <div class="table-wrap compact" id="table-allocations"></div>
              </div>
            </div>
          </section>
        </div>

        <!-- Row: News + Orders -->
        <div class="row-2col">
          <section class="card">
            <div class="card-head">
              <h2 class="card-title">News &amp; Macro</h2>
            </div>
            <div class="card-body">
              <div class="news-summary" id="news-summary">
                <div class="news-summary-loading">Loading summary...</div>
              </div>
              <details class="expandable">
                <summary>Raw Data</summary>
                <div class="expand-content">
                  <div class="news-section">
                    <div class="news-label">Macro</div>
                    <div class="news-text" id="text-macro">—</div>
                  </div>
                  <div class="news-section">
                    <div class="news-label">News</div>
                    <div class="news-text" id="text-news">—</div>
                  </div>
                  <div class="news-section">
                    <div class="news-label">SEC Filings</div>
                    <div class="news-text" id="text-filings">—</div>
                  </div>
                </div>
              </details>
            </div>
          </section>

          <section class="card">
            <div class="card-head">
              <h2 class="card-title">Orders</h2>
            </div>
            <div class="card-body">
              <div class="table-wrap" id="table-orders"></div>
              <div class="order-summary" id="list-exec-summary"></div>
            </div>
          </section>
        </div>

        <!-- Review -->
        <section class="card">
          <div class="card-head">
            <h2 class="card-title">Daily Review</h2>
          </div>
          <div class="card-body">
            <div class="review-highlights" id="list-review-highlights"></div>
            <div class="review-auto-brief" id="list-review-auto-brief"></div>
          </div>
        </section>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
